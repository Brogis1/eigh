# ============================================================================
# CUDA build configuration for the `eigh-cuda12` PyPI package.
#
# This is the SAME source tree and the SAME importable `eigh` Python package as
# the CPU build in pyproject.toml — only the *distribution* differs:
#   * distribution name      -> eigh-cuda12   (CPU build is just `eigh`)
#   * the compiled GPU kernel -> forced ON via EIGH_REQUIRE_CUDA=ON
#   * runtime deps           -> NVIDIA CUDA 12 runtime wheels + jax[cuda12]
#
# Build it by pointing the build frontend at this file, e.g.:
#   python -m build --wheel -C dist-name=... is NOT how scikit-build-core works;
# instead the CUDA workflow copies this over pyproject.toml before building
# (see .github/workflows/publish-cuda.yml). One repository, two packages.
#
# Linux x86_64 only: NVIDIA's CUDA wheels and nvcc exist only for that platform.
# ============================================================================

[build-system]
requires = [
    "scikit-build-core>=0.8",
    "nanobind>=1.0.0",
    # Same forward-compatibility rule as the CPU build: compile the FFI handler
    # against the oldest supported jaxlib so the binary loads on every newer one.
    "jaxlib==0.5.*",
    "numpy>=1.20.0",
]
build-backend = "scikit_build_core.build"

[project]
name = "eigh-cuda12"
version = "0.3.1"
description = "Differentiable eigenvalue decomposition with JAX — CUDA 12 (GPU) build"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "Igor Sokolov"},
]
maintainers = [
    {name = "Igor Sokolov"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Environment :: GPU :: NVIDIA CUDA :: 12",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
]
keywords = ["jax", "eigenvalue", "linear-algebra", "gpu", "cuda", "autodiff"]
dependencies = [
    "jax>=0.5.0",
    "jaxlib>=0.5.0",
    "numpy>=1.20.0",
    # CUDA 12 runtime libraries the compiled eigh_cuda.so links against. Shipped
    # as NVIDIA's official pip wheels so the eigh-cuda12 wheel stays small and
    # does not bundle hundreds of MB. The .so finds them via an RPATH into the
    # installed nvidia/*/lib directories (set in the CUDA workflow).
    "nvidia-cuda-runtime-cu12",
    "nvidia-cusolver-cu12",
    "nvidia-cublas-cu12",
    # Pulls a CUDA-12 jaxlib so JAX itself runs on GPU. Without this the GPU
    # kernel is present but JAX would place data on CPU.
    "jax[cuda12]>=0.5.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0.0", "scipy>=1.7.0"]

[project.urls]
Homepage = "https://github.com/Brogis1/eigh"
Repository = "https://github.com/Brogis1/eigh"
"Original Project" = "https://github.com/fishjojo/pyscfad"

[tool.scikit-build]
cmake.version = ">=3.18"
cmake.build-type = "Release"
build-dir = "build/{wheel_tag}"
wheel.packages = ["src/python/eigh"]
# Same abi3 policy as the CPU build: default to a version-specific wheel; the
# CUDA workflow sets wheel.py-api=cp312 per-interpreter where abi3 is valid.
wheel.py-api = ""

[tool.scikit-build.cmake.define]
# Hard-require the CUDA toolchain so a GPU package can never ship a CPU-only
# binary. The build fails loudly if nvcc is absent.
EIGH_REQUIRE_CUDA = "ON"

[tool.cibuildwheel]
build-verbosity = 1
# GPU wheels: Linux x86_64 only, same Python span as CPU.
build = "cp310-* cp311-* cp312-*"
skip = "pp* cp38-* cp39-* *-musllinux_*"
before-build = "pip install 'jaxlib==0.5.*'"
# CI has no GPU, so we can only verify that the compiled extension *loads* and
# registers its FFI target — not that it executes on a device. Real GPU
# correctness is verified manually on a CUDA machine before trusting a release.
test-command = "python -c \"import eigh._core as c; assert c._cuda_available, 'eigh_cuda failed to load'; print('eigh_cuda loaded + registered')\""

[[tool.cibuildwheel.overrides]]
select = "cp312-*"
config-settings."wheel.py-api" = "cp312"

[tool.cibuildwheel.linux]
# The GPU build still compiles the CPU eigh_lapack module, which needs
# BLAS/LAPACK. Install them in the CUDA manylinux container (AlmaLinux 8 / dnf).
# Without this, CMake's find_package(BLAS) fails with "Could NOT find BLAS".
before-all = "bash {project}/scripts/install_build_deps.sh"
