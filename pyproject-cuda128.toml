# ============================================================================
# Build configuration for the `eigh-cuda128` PyPI package.
#
# Same source tree and same importable `eigh` package as the CPU build; only the
# distribution differs. This variant is built against the CUDA 12.8 toolkit, so
# the binary requires CUDA 12.8 or newer at runtime. Use this on modern CUDA
# clusters that want the newer toolkit/glibc. It is built on manylinux_2_34
# (glibc 2.34, RHEL 9+ / Ubuntu 22.04+).
#
# The companion `eigh-cuda120` (pyproject-cuda120.toml) targets CUDA 12.0 on the
# wider manylinux2014 (glibc 2.17) baseline and is forward-compatible up to
# 12.8+, so prefer it for older clusters. Both are built by
# .github/workflows/publish-cuda.yml.
#
# Linux x86_64 only: NVIDIA's CUDA wheels and nvcc exist only for that platform.
# ============================================================================

[build-system]
# jaxlib is intentionally NOT here — it hard-depends on scipy, which can fail to
# install/source-build in the build image. We need only jaxlib's XLA FFI headers,
# installed with --no-deps in before-build with build isolation OFF (see below).
requires = [
    "scikit-build-core>=0.8",
    "nanobind>=1.0.0",
    "numpy>=1.20.0",
]
build-backend = "scikit_build_core.build"

[project]
name = "eigh-cuda128"
version = "0.3.11"
description = "Differentiable eigenvalue decomposition with JAX — CUDA 12.8 (GPU) build"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "Igor Sokolov"},
]
maintainers = [
    {name = "Igor Sokolov"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Environment :: GPU :: NVIDIA CUDA :: 12",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
]
keywords = ["jax", "eigenvalue", "linear-algebra", "gpu", "cuda", "autodiff"]
dependencies = [
    "jax>=0.5.0",
    "jaxlib>=0.5.0",
    "numpy>=1.20.0",
    # CUDA 12 runtime libraries the compiled eigh_cuda.so links against (directly
    # or transitively). Shipped as NVIDIA's official pip wheels so this wheel
    # stays small (~1 MB) instead of bundling hundreds of MB. cusolver pulls in
    # cublas/cublasLt/cusparse/nvJitLink/nvrtc, so all are listed here AND
    # excluded from auditwheel bundling in the CUDA workflow.
    "nvidia-cuda-runtime-cu12",
    "nvidia-cusolver-cu12",
    "nvidia-cublas-cu12",
    "nvidia-cusparse-cu12",
    "nvidia-cuda-nvrtc-cu12",
    "nvidia-nvjitlink-cu12",
    # Pulls a CUDA-12 jaxlib so JAX itself runs on GPU.
    "jax[cuda12]>=0.5.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0.0", "scipy>=1.7.0"]

[project.urls]
Homepage = "https://github.com/Brogis1/eigh"
Repository = "https://github.com/Brogis1/eigh"
"Original Project" = "https://github.com/fishjojo/pyscfad"

[tool.scikit-build]
cmake.version = ">=3.18"
cmake.build-type = "Release"
build-dir = "build/{wheel_tag}"
wheel.packages = ["src/python/eigh"]
wheel.py-api = ""

[tool.scikit-build.cmake.define]
EIGH_REQUIRE_CUDA = "ON"

[tool.cibuildwheel]
build-verbosity = 1
build = "cp310-* cp311-* cp312-*"
skip = "pp* cp38-* cp39-* *-musllinux_*"
# Build WITHOUT isolation so the jaxlib installed in before-build (headers only)
# is visible to the backend, instead of pip re-resolving build-system.requires
# (which would drag in jaxlib's scipy dep and can fail). before-build installs
# ALL build deps; jaxlib goes in with --no-deps so scipy is never pulled.
build-frontend = "build; args: --no-isolation"
before-build = "pip install 'scikit-build-core>=0.8' 'nanobind>=1.0.0' 'numpy>=1.20.0' cmake ninja && pip install --no-deps 'jaxlib==0.5.*'"
config-settings."cmake.define.CMAKE_CUDA_COMPILER" = "/usr/local/cuda/bin/nvcc"
test-command = "python -c \"from eigh import eigh_cuda; assert hasattr(eigh_cuda, 'registrations'); print('eigh_cuda dlopen OK:', list(eigh_cuda.registrations().keys()))\""

[[tool.cibuildwheel.overrides]]
select = "cp312-*"
inherit.config-settings = "append"
config-settings."wheel.py-api" = "cp312"

[tool.cibuildwheel.linux]
before-all = "bash {project}/scripts/install_build_deps.sh"
