name: Build and publish CUDA wheels (eigh-cuda12)

# Builds the GPU package `eigh-cuda12` from the SAME repository/source tree as
# the CPU `eigh` package. One repo, two PyPI names. Triggered by the same
# version tags as the CPU publish workflow.
#
# IMPORTANT: GitHub-hosted runners have no GPU. CI compiles the CUDA kernel and
# verifies the extension LOADS, but cannot run it on a device. Verify real GPU
# correctness on a CUDA machine/cluster before trusting a release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build_cuda_wheels:
    name: Build CUDA wheels (linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build eigh-cuda12 instead of eigh by swapping the project config. The
      # source tree is identical; only [project].name, deps, and the forced
      # CUDA build differ.
      - name: Select the CUDA build configuration
        run: cp pyproject-cuda.toml pyproject.toml

      - name: Build CUDA wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_ARCHS_LINUX: x86_64
          # Build inside a manylinux_2_28 image that ships a COMPLETE CUDA 12
          # toolkit (real nvcc + cudart/cusolver/cublas dev libs under
          # /usr/local/cuda). This replaces the earlier "install nvcc via pip
          # wheels" approach, which does NOT work: the nvidia-cuda-nvcc-cu12 wheel
          # ships only ptxas, not the nvcc compiler driver. CUDA 12.3 toolkit
          # binaries are forward-compatible with newer CUDA 12.x runtimes/drivers.
          CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_28_x86_64_cuda_12.3
          # The image already puts /usr/local/cuda/bin on PATH and sets CUDA_HOME,
          # so nvcc IS present — but cibuildwheel's CIBW_ENVIRONMENT handling can
          # shadow the image PATH and make CMake's check_language(CUDA) miss it.
          # Instead of overriding PATH, hand CMake the compiler path explicitly
          # via a build config-setting. This makes CUDA detection unconditional.
          CIBW_BEFORE_BUILD: "pip install 'jaxlib==0.5.*'"
          # Hand CMake the toolkit explicitly so enable_language(CUDA) always
          # finds it. CMAKE_CUDA_COMPILER is set via config-settings in
          # pyproject-cuda.toml (NOT here as CIBW_CONFIG_SETTINGS, which would
          # clobber the per-interpreter wheel.py-api=cp312 abi3 override). CUDACXX
          # is a belt-and-braces env fallback for the CMake autodetect path.
          CIBW_ENVIRONMENT_LINUX: 'CUDACXX=/usr/local/cuda/bin/nvcc CUDA_HOME=/usr/local/cuda'
          # Do NOT vendor the toolkit's CUDA libraries into the wheel. We build
          # against the image's toolkit but resolve cusolver/cublas/cudart at
          # RUNTIME from the NVIDIA pip wheels (declared as deps in
          # pyproject-cuda.toml, found via the RPATH set in CMakeLists.txt).
          # Bundling would add hundreds of MB and could clash with the pip libs.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair -w {dest_dir}
            --exclude libcudart.so.12 --exclude libcusolver.so.11
            --exclude libcublas.so.12 --exclude libcublasLt.so.12
            --exclude libnvJitLink.so.12
            {wheel}
          # No GPU in CI. Assert only that the compiled CUDA extension DLOPENS
          # and exposes its registration symbols. We import the eigh_cuda module
          # directly rather than eigh._core, because _core registers a "gpu"
          # platform FFI target with JAX, which can require a live GPU backend
          # that CI lacks. A successful dlopen proves the kernel compiled and its
          # CUDA runtime deps resolve; real device execution is verified on GPU
          # hardware before a release.
          CIBW_TEST_COMMAND: >-
            python -c "from eigh import eigh_cuda; assert hasattr(eigh_cuda, 'registrations');
            print('eigh_cuda dlopen OK:', list(eigh_cuda.registrations().keys()))"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-cuda-wheels
          path: ./wheelhouse/*.whl

  upload_pypi_cuda:
    needs: [build_cuda_wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cibw-cuda-wheels
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Publishes to the eigh-cuda12 PyPI project (first upload creates it).
          # Reuses the same PyPI token / trusted-publishing setup as `eigh`.
          password: ${{ secrets.PYPI_API_TOKEN }}
