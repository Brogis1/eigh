name: Build and publish CUDA wheels (eigh-cuda120 / eigh-cuda128)

# Builds the GPU packages from the SAME repository/source tree as the CPU `eigh`
# package. One repo, multiple PyPI names. Two CUDA targets:
#
#   eigh-cuda120 -> built against CUDA 12.0 (manylinux2014 / glibc 2.17).
#                   Forward-compatible: runs on CUDA 12.0 through 12.8+.
#                   Widest reach; the right default for older clusters.
#   eigh-cuda128 -> built against CUDA 12.8 (manylinux_2_34 / glibc 2.34).
#                   Requires CUDA 12.8+; newer toolkit/glibc.
#
# IMPORTANT: GitHub-hosted runners have no GPU. CI compiles the CUDA kernel and
# verifies the extension LOADS, but cannot run it on a device. Verify real GPU
# correctness on a CUDA machine/cluster before trusting a release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build_cuda_wheels:
    name: Build ${{ matrix.pkg }} (CUDA ${{ matrix.cuda }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: eigh-cuda120
            cuda: "12.0"
            pyproject: pyproject-cuda120.toml
            image: sameli/manylinux2014_x86_64_cuda_12.0
          - pkg: eigh-cuda128
            cuda: "12.8"
            pyproject: pyproject-cuda128.toml
            image: sameli/manylinux_2_34_x86_64_cuda_12.8

    steps:
      - uses: actions/checkout@v4

      # Build this CUDA variant by swapping in its project config. The source
      # tree is identical; only [project].name and the CUDA target differ.
      - name: Select the CUDA build configuration
        run: cp ${{ matrix.pyproject }} pyproject.toml

      - name: Build CUDA wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_ARCHS_LINUX: x86_64
          # manylinux image with a COMPLETE CUDA toolkit (real nvcc + dev libs in
          # /usr/local/cuda). The CUDA version and its matching GCC are baked into
          # the image, so each variant builds with a compatible host compiler:
          #   12.0 image -> GCC 10 (devtoolset-10), nvcc 12.0 accepts it
          #   12.8 image -> GCC 14, nvcc 12.8 accepts it
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.image }}
          # --no-deps: we install jaxlib ONLY for its bundled XLA FFI headers
          # (xla/ffi/api/ffi.h) that CMake compiles against. Pulling jaxlib's
          # deps drags in scipy, which has no manylinux2014 wheel for newer
          # versions and then tries to build from source against OpenBLAS — that
          # fails in the CUDA 12.0 (manylinux2014) image. The headers are in the
          # jaxlib wheel itself, so --no-deps is sufficient and avoids the trap.
          CIBW_BEFORE_BUILD: "pip install --no-deps 'jaxlib==0.5.*'"
          # Hand CMake the toolkit explicitly (CMAKE_CUDA_COMPILER is in the
          # pyproject config-settings; CUDACXX/CUDA_HOME are env fallbacks).
          CIBW_ENVIRONMENT_LINUX: 'CUDACXX=/usr/local/cuda/bin/nvcc CUDA_HOME=/usr/local/cuda'
          # Do NOT vendor CUDA libraries into the wheel. Build against the image's
          # toolkit but resolve them at RUNTIME from the NVIDIA pip wheels (deps in
          # the pyproject, found via RPATH from CMakeLists.txt). cusolver pulls in
          # cublas/cublasLt/cusparse/nvJitLink/nvrtc transitively, so ALL of those
          # must be excluded or auditwheel bundles them (-> hundreds of MB). Both
          # .so.11 and .so.12 majors are listed so the same command works for the
          # 12.0 and 12.8 toolkits regardless of each lib's SONAME major.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair -w {dest_dir}
            --exclude libcudart.so.11 --exclude libcudart.so.12
            --exclude libcublas.so.11 --exclude libcublas.so.12
            --exclude libcublasLt.so.11 --exclude libcublasLt.so.12
            --exclude libcusolver.so.11 --exclude libcusolver.so.12
            --exclude libcusolverMg.so.11 --exclude libcusolverMg.so.12
            --exclude libcusparse.so.11 --exclude libcusparse.so.12
            --exclude libnvJitLink.so.11 --exclude libnvJitLink.so.12
            --exclude libnvrtc.so.11 --exclude libnvrtc.so.12
            --exclude libnvrtc-builtins.so.11 --exclude libnvrtc-builtins.so.12
            {wheel}
          # No GPU in CI. Assert only that the compiled CUDA extension DLOPENS and
          # exposes its registration symbols (importing eigh_cuda directly, not
          # eigh._core, which would register a "gpu" FFI target needing a live
          # backend). Real device execution is verified on GPU hardware first.
          CIBW_TEST_COMMAND: >-
            python -c "from eigh import eigh_cuda; assert hasattr(eigh_cuda, 'registrations');
            print('eigh_cuda dlopen OK:', list(eigh_cuda.registrations().keys()))"

      # Safety net: the wheel must contain only our small compiled extensions, NOT
      # bundled CUDA libraries. If auditwheel ever vendors one despite --exclude,
      # the wheel balloons to hundreds of MB. Fail loudly so a giant wheel can
      # never publish silently. 50 MB >> our real size (~1 MB), << one CUDA lib.
      - name: Guard against accidentally bundling CUDA libraries
        run: |
          max=$((50 * 1024 * 1024))
          fail=0
          for w in wheelhouse/*.whl; do
            sz=$(stat -c%s "$w")
            echo "$(basename "$w"): $((sz / 1024 / 1024)) MB"
            if [ "$sz" -gt "$max" ]; then
              echo "::error::$w exceeds 50 MB — a CUDA library was bundled. Check the auditwheel --exclude list against the linked SONAMEs (readelf -d on eigh_cuda*.so)."
              fail=1
            fi
          done
          exit $fail

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-cuda-wheels-${{ matrix.pkg }}
          path: ./wheelhouse/*.whl

  upload_pypi_cuda:
    needs: [build_cuda_wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # Publish each CUDA variant INDEPENDENTLY. As a matrix job, each leg only
    # downloads its own variant's artifact, so if one variant's build fails the
    # other still publishes. Without this (a single upload job that needs the
    # whole matrix build), one failing variant skips the entire upload — which is
    # exactly why an earlier release published nothing despite one variant
    # building fine. always() lets surviving legs run even if a sibling failed;
    # the download then no-ops for any variant whose artifact is absent.
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        pkg: [eigh-cuda120, eigh-cuda128]
    steps:
      # Download only THIS variant's wheels. If the variant's build failed, no
      # artifact exists and the step finds nothing to publish (guarded below).
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: cibw-cuda-wheels-${{ matrix.pkg }}
          path: dist

      - name: Check wheels exist for ${{ matrix.pkg }}
        id: check
        run: |
          if ls dist/*.whl >/dev/null 2>&1; then
            echo "have_wheels=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_wheels=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No wheels for ${{ matrix.pkg }} — its build likely failed; skipping its publish."
          fi

      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.check.outputs.have_wheels == 'true'
        with:
          # First upload of each name auto-creates that PyPI project. Reuses the
          # same account-scoped PyPI token as `eigh` (must allow new projects).
          password: ${{ secrets.PYPI_API_TOKEN }}
