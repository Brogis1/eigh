name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest-jax:
    name: JAX eigensolver tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cmake ninja
          pip install "jax[cpu]" jaxtyping numpy scipy pytest

      - name: Build and install package
        run: pip install -e .

      - name: Run JAX eigensolver tests
        run: pytest tests/test_jax_eigensolvers.py -v --tb=short
