name: Build and publish wheels

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        # os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Build matrix, jaxlib build-pin, abi3 override and load-test all live in
      # [tool.cibuildwheel] in pyproject.toml (single source of truth). Only
      # arch/image selection is set here.
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # macOS arm64 only: JAX dropped macOS x86_64 (Intel) wheels at jaxlib
          # 0.4.38, so our jaxlib>=0.5 runtime floor is unsatisfiable on Intel
          # Macs — an x86_64 eigh wheel could never resolve its dependencies.
          CIBW_ARCHS_MACOS: arm64
          # Linux: only x86_64 for now (aarch64 requires QEMU and is slow)
          CIBW_ARCHS_LINUX: x86_64
          # manylinux_2_28 (AlmaLinux 8, glibc 2.28) - covers RHEL8+/Ubuntu18.04+
          # clusters. CentOS 7 (glibc 2.17) is EOL and intentionally unsupported.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-cpu-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-cpu-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      # Only the CPU `eigh` artifacts from THIS workflow run. download-artifact
      # is scoped to the current run, so the eigh-cuda12 workflow (a separate
      # run) can never contaminate this publish — the CPU release is fully
      # independent of the GPU build's success or failure.
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-cpu-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # registry-url: https://test.pypi.org/legacy/
          # To use trusted publishing, remove 'password' and setup trust on PyPI
          # Or use secrets.PYPI_API_TOKEN
           password: ${{ secrets.PYPI_API_TOKEN }}
